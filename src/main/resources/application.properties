# Camunda 8 SaaS Configuration
zeebe.client.cloud.clusterId=YOUR_CLUSTER_ID
zeebe.client.cloud.clientId=YOUR_CLIENT_ID
zeebe.client.cloud.clientSecret=YOUR_CLIENT_SECRET
zeebe.client.cloud.region=lhr-1

# Database Configuration Variables
database.postgresql.dburl=jdbc:postgresql://localhost:5432/YOUR_DB_NAME
database.postgresql.dbuser=YOUR_DB_USER
database.postgresql.dbpassword=YOUR_DB_PASSWORD

# Spring Datasource Configuration
spring.datasource.url=${database.postgresql.dburl}
spring.datasource.username=${database.postgresql.dbuser}
spring.datasource.password=${database.postgresql.dbpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=cinema

# Server Configuration
server.port=8080

# Mail Server Configuration
spring.mail.host=YOUR_MAIL_HOST
spring.mail.port=587
spring.mail.username=YOUR_MAIL_USERNAME
spring.mail.password=YOUR_MAIL_PASSWORD

mail.anstar.edu.pl.mailsmtphost=YOUR_SMTP_HOST
mail.anstar.edu.pl.mailuser=YOUR_ANSTAR_USER
mail.anstar.edu.pl.mailpassword=YOUR_ANSTAR_PASSWORD
mail.anstar.edu.pl.mailsendermail=YOUR_SENDER_EMAIL
mail.anstar.edu.pl.mailsendername=Ticket System

# External API Configuration
radon.nauka.gov.pl.url=https://radon.nauka.gov.pl/opendata/polon/courses?resultNumbers=100&leadingInstitutionUuid=df584ad3-5474-4618-812a-2e10b03b48c0
radon.nauka.gov.pl.apiKey=YOUR_API_KEY
